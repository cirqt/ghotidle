services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ghodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app/backend
    command: /bin/sh -c ".venv/bin/python manage.py migrate && .venv/bin/python data/load_valid_words.py && .venv/bin/python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/game:/app/backend/game
      - ./backend/manage.py:/app/backend/manage.py
    environment:
      DJANGO_SETTINGS_MODULE: ghotidle_backend.settings
      DJANGO_SECRET_KEY: "fallback-dev-key-change-in-production"
      DB_NAME: ghodb
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm start
    environment:
      - "CHOKIDAR_USEPOLLING=true"
      - "WATCHPACK_POLLING=true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/frontend/src
      # - ./frontend:/srv
volumes:
  pgdata: